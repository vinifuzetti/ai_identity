services:
  spire-server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: spire-server
    hostname: spire-server
    volumes:
      - ./config/server:/opt/spire/conf/server:ro
      - ./scripts/server-entrypoint.sh:/entrypoint.sh:ro
      - spire-server-data:/opt/spire/data/server
      - spire-sockets:/opt/spire/sockets
      - spire-bundle:/opt/spire/bundle
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  spire-agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
    container_name: spire-agent
    environment:
      - JOIN_TOKEN
    volumes:
      - ./config/agent:/opt/spire/conf/agent:ro
      - ./scripts/agent-entrypoint.sh:/entrypoint.sh:ro
      - spire-agent-data:/opt/spire/data/agent
      - spire-sockets:/opt/spire/sockets
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    pid: "host"

  agent-workload:
    build:
      context: .
      dockerfile: docker/workload.Dockerfile
    container_name: agent-workload
    environment:
      - SPIRE_AGENT_SOCKET=/opt/spire/sockets/agent.sock
      - SVID_AUDIENCE=empresa.com
    volumes:
      - spire-sockets:/opt/spire/sockets

  auth-server:
    build:
      context: .
      dockerfile: docker/auth-server.Dockerfile
    container_name: auth-server
    environment:
      - SPIRE_BUNDLE_PATH=/opt/spire/bundle/jwks.json
      - TRUST_DOMAIN=empresa.com
      - IDP_PUBLIC_KEY=/config/idp-public.pem
    volumes:
      - spire-bundle:/opt/spire/bundle:ro
      - ./config:/config:ro
    ports:
      - "8080:8080"

volumes:
  spire-server-data:
  spire-agent-data:
  spire-sockets:
  spire-bundle:
